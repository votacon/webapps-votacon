<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Relógio</title>
<style>
  :root { --bg:#0e1116; --text:#e6e9ee; --muted:#9aa4b2; --accent:#7aa2ff; }
  @media (prefers-color-scheme: light) {
    :root { --bg:#f6f7f9; --text:#1a1c1f; --muted:#5c636e; --accent:#3b5bdb; }
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  #time {
    font-size: clamp(3rem, 18vw, 9rem);
    font-weight: 700;
    letter-spacing: -.03em;
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  #date { color: var(--muted); font-size: clamp(1rem, 4vw, 1.4rem); text-transform: capitalize; }
  a.back { position: fixed; top: 20px; left: 20px; color: var(--accent); text-decoration: none; font-size: .95rem; }
  a.back:hover { text-decoration: underline; }
</style>
</head>
<body>
  <a class="back" href="../">← voltar</a>
  <div id="time">--:--:--</div>
  <div id="date"></div>
  <script>
    const timeEl = document.getElementById("time");
    const dateEl = document.getElementById("date");
    function tick() {
      const now = new Date();
      timeEl.textContent = now.toLocaleTimeString("pt-BR");
      dateEl.textContent = now.toLocaleDateString("pt-BR", { weekday: "long", day: "numeric", month: "long", year: "numeric" });
    }
    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
