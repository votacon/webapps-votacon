<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>webapps-votacon</title>
<style>
  :root {
    --bg: #f6f7f9;
    --card: #ffffff;
    --text: #1a1c1f;
    --muted: #5c636e;
    --border: #e4e7eb;
    --accent: #3b5bdb;
    --shadow: 0 1px 2px rgba(0,0,0,.04), 0 8px 24px rgba(0,0,0,.06);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0e1116;
      --card: #171b22;
      --text: #e6e9ee;
      --muted: #9aa4b2;
      --border: #262c36;
      --accent: #7aa2ff;
      --shadow: 0 1px 2px rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.4);
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 960px; margin: 0 auto; padding: 64px 24px 96px; }
  header { margin-bottom: 48px; }
  h1 { font-size: 2rem; margin: 0 0 8px; letter-spacing: -.02em; }
  .sub { color: var(--muted); margin: 0; font-size: 1.05rem; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
  }
  .card {
    display: block;
    text-decoration: none;
    color: inherit;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    box-shadow: var(--shadow);
    transition: transform .15s ease, border-color .15s ease;
  }
  .card:hover { transform: translateY(-2px); border-color: var(--accent); }
  .card .emoji { font-size: 1.6rem; }
  .card h2 { font-size: 1.05rem; margin: 12px 0 4px; }
  .card p { margin: 0; color: var(--muted); font-size: .9rem; }
  .empty { color: var(--muted); }
  footer { margin-top: 64px; color: var(--muted); font-size: .85rem; }
  code { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 1px 6px; font-size: .85em; }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>webapps-votacon</h1>
      <p class="sub">Coleção de pequenos webapps. Cada um mora numa pasta e vira um site próprio.</p>
    </header>
    <main>
      <div class="grid" id="grid"></div>
    </main>
    <footer>
      Para adicionar um app: crie uma pasta com <code>index.html</code> e acrescente uma linha em <code>APPS</code> neste arquivo.
    </footer>
  </div>
  <script>
    // Para adicionar um app, acrescente um objeto aqui e crie a pasta correspondente.
    const APPS = [
      { path: "the-round/", emoji: "⏱️", name: "The Round", desc: "Sprint focado de 15 minutos." },
      { path: "relogio/", emoji: "🕐", name: "Relógio", desc: "Relógio digital simples." },
    ];

    const grid = document.getElementById("grid");
    if (!APPS.length) {
      grid.innerHTML = '<p class="empty">Nenhum app ainda.</p>';
    } else {
      grid.innerHTML = APPS.map(a => `
        <a class="card" href="${a.path}">
          <div class="emoji">${a.emoji || "📦"}</div>
          <h2>${a.name}</h2>
          <p>${a.desc || ""}</p>
        </a>`).join("");
    }
  </script>
</body>
</html>
